name: Test

on:
  push:
    branches: main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: "clippy, rustfmt"
      - uses: olix0r/cargo-action-fmt/setup@v2
      - uses: Swatinem/rust-cache@v2
      - name: Running clippy
        run: cargo clippy --all-targets --all-features -p tango-bench --message-format=json | cargo-action-fmt
      - name: Checking formatting
        run: cargo fmt -- --check --color always
      - name: Typo
        uses: crate-ci/typos@master
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            toolchain: stable
          - os: macos-14
            toolchain: stable
          - os: windows-2022
            toolchain: nightly
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # On Windows we need to configure -Zexport-executable-symbols
      - name: Configure Windows nightly RUSTFLAGS
        if: runner.os == 'Windows'
        shell: bash
        run: cp .cargo/config.windows.toml .cargo/config.toml

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test

  bench:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            toolchain: stable
            exe:
          - os: macos-14
            toolchain: stable
            exe:
          - os: windows-2022
            toolchain: nightly
            exe: .exe
    runs-on: ${{ matrix.os }}
    # Do not run benchmarks if it is push to master or current branch has incompatibile protocol with the main.
    if: ${{
      ( github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'bench-protocol-changed') ) ||
      ( github.event_name == 'push' && github.ref != 'refs/heads/main' )
      }}
    steps:
      # Doing checkout 2 times for a current branch and then baseline-branch
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: dev
          path: baseline-branch

      # On Windows we need to configure -Zexport-executable-symbols
      - name: Configure Windows nightly RUSTFLAGS
        if: runner.os == 'Windows'
        shell: bash
        run: cp .cargo/config.windows.toml .cargo/config.toml

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-export

      - name: Building Benchmarks
        shell: bash
        run: |
          set -eo pipefail

          cargo export target/benchmarks -- bench --bench=tango
          cd baseline-branch
          cargo export target/benchmarks -- bench --bench=tango

      - name: Run Benchmarks
        shell: bash
        run: |
          set -eo pipefail

          target/benchmarks/tango${{ matrix.exe }} --color=never compare -v -t 1 --noise-threshold 10 \
            baseline-branch/target/benchmarks/tango${{ matrix.exe }} | tee target/benchmark.txt

      - uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ matrix.os }}.txt
          path: target/benchmark.txt
